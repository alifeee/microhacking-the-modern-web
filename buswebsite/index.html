<!doctype html>
<html>
  <head>
    <!-- need to generate journeys.json and timetable.json -->
    <!-- see https://git.alifeee.net/bus_bot/tree/busbot/mockdata/generate.py?h=talk/mocked-bot -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/picnic" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
      }
      * {
        box-sizing: border-box;
      }
      header {
        width: 100%;
        box-shadow: rgba(0, 0, 0, 0.1) 0px 3px 8px 1px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        span {
          margin: 1rem;
          border-radius: 1.5rem;
          border: 1px solid gray;
          padding: 1rem 2rem;
          font-weight: bold;
          color: #ff3d00;
        }
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: start;
        font-family:
          "Franklin Gothic Medium", "Arial Narrow", Arial, sans-serif;
        position: relative;
      }
      h1 {
        display: flex;
        align-items: center;
        margin: 0 0 0 1rem;
        svg {
          width: 3rem;
        }
      }
      hr {
        min-width: 20rem;
        border: 4px solid #ff3d00;
        margin-bottom: 2rem;
      }
      #main {
        display: flex;
        flex-direction: column;
      }
      .qr {
        position: absolute;
        bottom: 0;
        right: 0;
        width: 12rem;
        image-rendering: pixelated;
      }

      .loader {
        width: 48px;
        height: 48px;
        border: 5px solid #fff;
        border-bottom-color: #ff3d00;
        border-radius: 50%;
        display: inline-block;
        box-sizing: border-box;
        animation: rotation 1s linear infinite;
      }

      @keyframes rotation {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
    <script src="tsparticles.confetti.bundle.min.js.js"></script>
    <script>
      DELAY_INITIAL = 1200;
      DELAY_START = 1500;
      DELAY_DATE = 900;
      DELAY_TIME = 3000;
      let journeys = {};
      let timetable = {};
      let main;
      let p1 = fetch("journeys.json")
        .then((data) => data.json())
        .then((json) => (journeys = json));
      let p2 = fetch("timetable.json")
        .then((data) => data.json())
        .then((json) => (timetable = json));

      function removeChildren() {
        while (main.firstChild) {
          main.removeChild(main.firstChild);
        }
      }

      function addSpinner() {
        removeChildren();
        const span = document.createElement("span");
        span.classList.add("loader");
        main.appendChild(span);
      }

      function addStartButton() {
        removeChildren();
        const button = document.createElement("button");
        button.innerText = "start";
        button.addEventListener("click", start);
        main.appendChild(button);
      }

      async function start() {
        let dates = journeys.data[0].journeys
          .map((j) =>
            j.start_date.replace(
              /([0-9]{4})([0-9]{2})([0-9]{2})([0-9]{2})([0-9]{2})([0-9]{2}).*/,
              "$1-$2-$3T$4:$5",
            ),
          )
          .map((d) => new Date(Date.parse(d)));
        let tsdays = [
          ...new Set(
            dates.map((d) =>
              Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate()),
            ),
          ),
        ];
        let days = tsdays.map((tsd) => new Date(tsd));
        addSpinner();
        await new Promise((resolve) => setTimeout(resolve, DELAY_START));
        removeChildren();
        days.forEach((day) => {
          const dayel = document.createElement("button");
          dayel.dataset.year = day.getFullYear();
          dayel.dataset.month = day.getMonth();
          dayel.dataset.date = day.getDate();
          dayel.addEventListener("click", clickDate);
          dayel.innerText =
            ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"][day.getDay()] +
            " " +
            day.getUTCDate() +
            " " +
            [
              "",
              "Jan",
              "Feb",
              "Mar",
              "Apr",
              "May",
              "Jun",
              "Jul",
              "Aug",
              "Sep",
              "Oct",
              "Nov",
              "Dec",
            ][day.getMonth()];
          main.appendChild(dayel);
        });
      }

      async function clickDate(e) {
        console.log(e.target);
        let jrnys = journeys.data[0].journeys.filter((j) => {
          let d = new Date(
            Date.parse(
              j.start_date.replace(
                /([0-9]{4})([0-9]{2})([0-9]{2})([0-9]{2})([0-9]{2})([0-9]{2}).*/,
                "$1-$2-$3T$4:$5",
              ),
            ),
          );
          if (
            d.getFullYear() == e.target.dataset.year &&
            d.getMonth() == e.target.dataset.month &&
            d.getDate() == e.target.dataset.date
          ) {
            return true;
          } else {
            return false;
          }
        });
        console.log(jrnys);
        addSpinner();
        await new Promise((resolve) => setTimeout(resolve, DELAY_DATE));
        removeChildren();
        jrnys.forEach((j) => {
          const jrnel = document.createElement("button");
          jrnel.innerText = j.start_date.replace(
            /([0-9]{4})([0-9]{2})([0-9]{2})([0-9]{2})([0-9]{2})([0-9]{2}).*/,
            "$4:$5",
          );
          jrnel.dataset.id = j.id;
          jrnel.addEventListener("click", clickTime);
          main.appendChild(jrnel);
        });
      }

      async function clickTime(e) {
        let capacity = timetable[e.target.dataset.id];
        addSpinner();
        await new Promise((resolve) => setTimeout(resolve, DELAY_TIME));
        removeChildren();
        if (capacity > 0) {
          const notice = document.createElement("p");
          notice.innerText = `${capacity} seats left on this trip`;
          main.appendChild(notice);
          const button = document.createElement("button");
          button.innerText = "book seat";
          button.addEventListener("click", win);
          main.appendChild(button);
        } else {
          const notice = document.createElement("p");
          notice.innerText = "sorry! this journey has no seats available";
          main.appendChild(notice);
          const button = document.createElement("button");
          button.addEventListener("click", (e) => window.location.reload());
          button.innerText = "back";
          main.appendChild(button);
        }
      }

      function win(e) {
        confetti({
          particleCount: 100,
          spread: 70,
          origin: { y: 0.6 },
        });
      }

      document.addEventListener("DOMContentLoaded", (e) => {
        main = document.getElementById("main");
        Promise.all([
          p1,
          p2,
          new Promise((resolve) => setTimeout(resolve, DELAY_INITIAL)),
        ]).then((_) => {
          addStartButton();
        });
      });

      function book() {}
    </script>
  </head>
